<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Offline</title>

<style>
{% raw %}

body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: monospace;
    color: white;
}

.overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

h1 {
    font-size: 42px;
    letter-spacing: 4px;
    font-weight: 500;
    opacity: 0.95;
}

.status {
    margin-top: 10px;
    opacity: 0.6;
}

.loader {
    margin-top: 20px;
    font-size: 14px;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.2; }
}

button {
    margin-top: 25px;
    padding: 10px 20px;
    border: 1px solid cyan;
    background: transparent;
    color: cyan;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: cyan;
    color: black;
}

#gameCanvas {
    position: absolute;
    top: 0;
    left: 0;
}
{% endraw %}
</style>
</head>

<body>

<div class="overlay">
    <h1>SYSTEM DOWN</h1>
    <div class="status">attempting reconnection...</div>
    <div class="loader">● ● ●</div>
    <button onclick="location.reload()">RETRY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<canvas id="gameCanvas"></canvas>

<div id="score" style="
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:14px;
opacity:0.7;">
score: 0
</div>

<script>
{% raw %}

// ===== THREE JS BACKGROUND =====
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const geometry = new THREE.BufferGeometry();
const count = 1200;

const positions = new Float32Array(count * 3);

for (let i = 0; i < count * 3; i++) {
    positions[i] = (Math.random() - 0.5) * 30;
}

geometry.setAttribute(
    'position',
    new THREE.BufferAttribute(positions, 3)
);

const material = new THREE.PointsMaterial({ size: 0.05 });
const particles = new THREE.Points(geometry, material);

scene.add(particles);
camera.position.z = 5;

function animate() {
    requestAnimationFrame(animate);

    particles.rotation.y += 0.001;
    particles.rotation.x += 0.0005;

    renderer.render(scene, camera);
}

animate();

// AUTO RETRY
setInterval(() => {
    fetch("/")
        .then(() => location.reload())
        .catch(() => {});
}, 5000);

// RESIZE
window.addEventListener("resize", () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});

// ===== GAME =====
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;

let player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    r: 10
};

let enemies = [];
let gameOver = false;

for (let i = 0; i < 12; i++) {
    enemies.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 2.5,
        vy: (Math.random() - 0.5) * 2.5,
        r: 8
    });
}

function movePlayer(x, y) {
    player.x = x;
    player.y = y;
}

canvas.addEventListener("mousemove", (e) => {
    movePlayer(e.clientX, e.clientY);
});

canvas.addEventListener("touchmove", (e) => {
    movePlayer(e.touches[0].clientX, e.touches[0].clientY);
});

function gameLoop() {
    if (gameOver) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // player
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
    ctx.fillStyle = "#00ffd0";
    ctx.fill();

    enemies.forEach(e => {
        e.x += e.vx;
        e.y += e.vy;

        if (e.x < 0 || e.x > canvas.width) e.vx *= -1;
        if (e.y < 0 || e.y > canvas.height) e.vy *= -1;

        ctx.beginPath();
        ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 80, 80, 0.9)";
        ctx.fill();

        let dx = player.x - e.x;
        let dy = player.y - e.y;

        if (Math.sqrt(dx * dx + dy * dy) < player.r + e.r) {
            gameOver = true;
            showGameOver();
        }
    });

    score++;
    document.getElementById("score").innerText = "score: " + score;

    requestAnimationFrame(gameLoop);
}

gameLoop();

function showGameOver() {
    const overlay = document.createElement("div");

    overlay.style.position = "absolute";
    overlay.style.top = "50%";
    overlay.style.left = "50%";
    overlay.style.transform = "translate(-50%, -50%)";
    overlay.style.textAlign = "center";
    overlay.style.color = "white";

    overlay.innerHTML = `
        <h2 style="margin-bottom:10px;">Connection Lost</h2>
        <p style="opacity:0.6;">Score: ${score}</p>
        <button onclick="location.reload()">Retry</button>
    `;

    document.body.appendChild(overlay);
}

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

{% endraw %}
</script>

</body>
</html>
