<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Anonymous Wall</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet"
 href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<style>
body{
  margin:0;
  font-family: monospace;
  background:#f5f5f5;
  height:100vh;
  display:flex;
  flex-direction:column;
  transition:.3s;
}
body.dark{
  background:#111;
  color:white;
}

/* TOP BAR */
#topbar{
  border-bottom:4px solid black;
  padding:10px;
  background:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
body.dark #topbar{
  background:#222;
  color:white;
  border-bottom:4px solid white;
}

/* WALL */
#wall{
  flex:1;
  overflow-y:auto;
  padding:12px;
}

/* CARD */
.card{
  background:white;
  border:3px solid black;
  box-shadow:3px 3px 0 black;
  padding:10px;
  margin-bottom:12px;
}
body.dark .card{
  background:#1a1a1a;
  border:3px solid white;
  box-shadow:3px 3px 0 white;
}

.time{
  font-size:12px;
  opacity:.7;
  margin-bottom:4px;
}

/* REACTIONS */
.reactions{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-top:8px;
}
.react-btn{
  border:2px solid black;
  box-shadow:2px 2px 0 black;
  padding:4px;
  background:white;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}
body.dark .react-btn{
  background:#222;
  color:white;
  border:2px solid white;
  box-shadow:2px 2px 0 white;
}
.react-btn.active{
  background:#ffeaa7;
}

/* BUTTON */
button{
  background:white;
  border:2px solid black;
  box-shadow:2px 2px 0 black;
  padding:6px 10px;
  cursor:pointer;
  font-family: monospace;
}
body.dark button{
  background:#222;
  color:white;
  border:2px solid white;
  box-shadow:2px 2px 0 white;
}
button:active{
  transform:translate(2px,2px);
  box-shadow:0 0 0 black;
}
.d{background:red;color:white}

/* FLOAT PENCIL */
#pencil{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:22px;
}

/* POPUP */
#popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  justify-content:center;
  align-items:center;
}

#popupBox{
  background:white;
  border:3px solid black;
  box-shadow:4px 4px 0 black;
  padding:12px;
  width:min(90%,360px);
}
body.dark #popupBox{
  background:#222;
  color:white;
  border:3px solid white;
}

textarea{
  width:100%;
  height:120px;
  border:2px solid black;
  box-shadow:2px 2px 0 black;
  font-family: monospace;
}
body.dark textarea{
  background:#111;
  color:white;
  border:2px solid white;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  border:2px solid black;
  box-shadow:2px 2px 0 black;
  padding:6px 12px;
  display:none;
}
body.dark #toast{
  background:#222;
  color:white;
  border:2px solid white;
}

/* MOBILE */
@media(max-width:600px){
  #topbar{position:sticky;top:0}
}
body.dark #popup{background:rgba(0,0,0,.7);}
body.dark #toast{background:#222;color:white;border:2px solid white;}
</style>
</head>

<body>

<div id="topbar">
  <b>🧱 Anonymous Wall</b>
  <span>
    <button onclick="toggleDark()">🌙</button>
    <span id="status">Live</span>
  </span>
</div>

<div id="wall"></div>

<button id="pencil" onclick="openPopup()">
<i class="ph ph-pencil"></i>
</button>

<!-- POPUP -->
<div id="popup">
  <div id="popupBox">
    <b>Write confession</b><br><br>
    <textarea id="text"></textarea><br><br>
    <button onclick="send()">Confess</button>
    <button class="d" onclick="closePopup()">Cancel</button>
  </div>
</div>

<div id="toast"></div>

<script>
let knownIDs = new Set();

function toast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";

  gsap.fromTo(t,{opacity:0,y:20},{opacity:1,y:0,duration:.3});

  setTimeout(()=>{
    gsap.to(t,{opacity:0,y:20,duration:.3,onComplete:()=>t.style.display="none"});
  },2000);
}

function openPopup(){
  popup.style.display="flex";
  gsap.fromTo("#popup",{opacity:0},{opacity:1,duration:.2});
  gsap.from("#popupBox",{scale:.8,y:40,opacity:0,duration:.4,ease:"back.out(1.7)"});
}
function closePopup(){
  gsap.to("#popupBox",{scale:0.8,opacity:0,y:40,duration:.25,onComplete:()=>popup.style.display="none"});
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

function timeAgo(ts){
  let diff=Math.floor(Date.now()/1000-ts);
  if(diff<60) return "just now";
  if(diff<3600) return Math.floor(diff/60)+" min ago";
  if(diff<86400) return Math.floor(diff/3600)+" hrs ago";
  return "old";
}

async function loadFeed(){
  let res = await fetch("/feed");
  let data = await res.json();

  data.forEach(c=>{
    let id = c[0];
    let existing = document.querySelector(`.card[data-id="${id}"]`);

    // 🆕 NEW CARD
    if(!existing){
      knownIDs.add(id);

      let div = document.createElement("div");
      div.className="card";
      div.dataset.id=id;

      div.innerHTML = buildCardHTML(c);
      wall.prepend(div);

      gsap.from(div,{
        opacity:0,
        y:-30,
        scale:.95,
        duration:.4,
        ease:"power2.out"
      });
    }
    // 🔁 UPDATE OLD CARD (reactions + time)
    else{
      updateReactions(existing,c);
      existing.querySelector(".time").innerText = timeAgo(c[2]);
    }
  });
}
function buildCardHTML(c){
  return `
    <div class="time">${timeAgo(c[2])}</div>
    <div>${c[1]}</div>

    <div class="reactions">
      <div class="react-btn" data-emoji="🥳" onclick="react(${c[0]},'🥳')">🥳 ${c[4]||0}</div>
      <div class="react-btn" data-emoji="🔥" onclick="react(${c[0]},'🔥')">🔥 ${c[5]||0}</div>
      <div class="react-btn" data-emoji="👍" onclick="react(${c[0]},'👍')">👍 ${c[6]||0}</div>
      <div class="react-btn" data-emoji="👎" onclick="react(${c[0]},'👎')">👎 ${c[7]||0}</div>
    </div>

    <br>
    <button class="d" onclick="report(${c[0]})">
      <i class="ph ph-flag"></i> Report
    </button>
  `;
}

function updateReactions(card,c){
  let map = {
    "🥳": c[4]||0,
    "🔥": c[5]||0,
    "👍": c[6]||0,
    "👎": c[7]||0
  };

  card.querySelectorAll(".react-btn").forEach(btn=>{
    let e = btn.dataset.emoji;
    btn.innerHTML = `${e} ${map[e]}`;
  });
}
async function send(){
  let text=document.getElementById("text").value;
  let res=await fetch("/confess",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text})
  });
  let data=await res.json();

  if(res.status==200){
    toast("Confession posted");
    text="";
    closePopup();
    loadFeed();
  }else if(res.status==429){
    toast("Wait before posting again");
  }else{
    toast(data.error||"Error");
  }
}

async function report(id){
  let res=await fetch("/report/"+id,{method:"POST"});
  if(res.status==200) toast("Reported");
  else toast("Already reported");
}
async function react(id,emoji){
  let card = document.querySelector(`[data-id="${id}"]`);
  let btn = card.querySelector(`[data-emoji="${emoji}"]`);

  // instant UI feedback
  let num = parseInt(btn.innerText.split(" ")[1]);
  btn.innerHTML = `${emoji} ${num+1}`;

  let res = await fetch("/react/"+id,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({emoji})
  });

  let data = await res.json();

  card.querySelectorAll(".react-btn").forEach(b=>{
    let e=b.dataset.emoji;
    b.classList.remove("active");
    b.innerHTML = `${e} ${data[e]||0}`;
    if(data.user==e) b.classList.add("active");
  });
}
loadFeed();
setInterval(loadFeed,5000);
</script>

</body>
</html>
