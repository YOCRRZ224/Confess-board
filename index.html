<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gateway Idle</title>

<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

<style>

*{{box-sizing:border-box;}}

body{{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
font-family:'Source Code Pro', monospace;
background:linear-gradient(-45deg,#050505,#0f2027,#000000,#111);
background-size:400% 400%;
animation:bg 12s ease infinite;
color:white;
}}

@keyframes bg{{
0%{{background-position:0% 50%;}}
50%{{background-position:100% 50%;}}
100%{{background-position:0% 50%;}}
}}

.card{{
width:100%;
max-width:420px;
padding:32px;
border-radius:14px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
box-shadow:0 0 30px rgba(0,0,0,0.6);
text-align:center;
}}

h1{{
font-family:'Audiowide', cursive;
color:#ff5555;
margin-top:0;
}}

.status{{
margin-top:10px;
font-size:14px;
color:#ff7777;
}}

.info{{
margin-top:20px;
background:rgba(0,0,0,0.35);
padding:14px;
border-radius:10px;
text-align:left;
font-size:13px;
line-height:1.6;
}}

.log{{
margin-top:16px;
font-size:12px;
color:#ffaa66;
height:80px;
overflow:hidden;
text-align:left;
}}

.clock{{
margin-top:15px;
font-size:13px;
color:#aaa;
}}

.retry{{
margin-top:15px;
color:#ff7777;
font-size:14px;
}}

button{{
margin-top:18px;
padding:10px 18px;
border:none;
border-radius:8px;
background:#ff4444;
color:white;
font-family:'Source Code Pro';
cursor:pointer;
}}

button:hover{{
background:#ff2222;
}}

</style>
</head>

<body>

<div class="card">

<h1>🚫 Gateway Offline</h1>

<p class="status">Tunnel Status: INACTIVE</p>

<div class="info">
Gateway Node: YOCRRZ<br>
Server State: Offline<br>
Monitoring: Enabled<br>
Next Check: <span id="retry">10</span>s
</div>

<div class="log" id="log"></div>

<div class="clock">
Local Time: <span id="time"></span>
</div>

<div class="retry">
Retrying connection automatically...
</div>

<button onclick="location.reload()">Retry Now</button>

</div>

<script>

function updateClock(){{
const now = new Date();
document.getElementById("time").textContent =
now.toLocaleTimeString();
}}

setInterval(updateClock,1000);
updateClock();

const logs=[
"Gateway monitoring enabled",
"Waiting for active tunnel...",
"No cloudflare route detected",
"Server node unreachable",
"Retry scheduled..."
];

let i=0;

function showLog(){{
if(i<logs.length){{
document.getElementById("log").innerHTML+="> "+logs[i]+"<br>";
i++;
setTimeout(showLog,700);
}}
}}

showLog();

let retry=10;

setInterval(() => {{
retry--;
document.getElementById("retry").textContent=retry;

if(retry<=0){{
location.reload();
}}

}},1000);

</script>

</body>
</html>
